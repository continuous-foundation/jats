# JATS references → cite (partial mdast). Loaded by convert.spec.ts with all tests/*.yml.

cases:
  - source: references
    title: pub-id-type doi returns doi
    jats: |-
      <article><body><xref rid="B5-molecules-13-00204" ref-type="bibr">1</xref></body><back>
      <ref-list>
      <ref id="B5-molecules-13-00204"><label>5.</label>
      <element-citation publication-type="journal">
      <person-group person-group-type="author"><name><surname>Lavis</surname><given-names>L. D.</given-names></name><name><surname>Chao</surname><given-names>T. Y.</given-names></name><name><surname>Raines</surname><given-names>R. T.</given-names></name></person-group>
      <article-title>Latent blue and red fluorophores based on the trimethyl lock</article-title>
      <source>ChemBioChem</source>
      <year>2006</year>
      <volume>7</volume>
      <fpage>1151</fpage>
      <lpage>1154</lpage>
      <pub-id pub-id-type="doi">10.1002/cbic.200500559</pub-id>
      </element-citation>
      </ref>
      </ref-list>
      </back></article>
    opts:
      dois: true
      pmidCache:
        '16755624': '10.1002/cbic.200500559'
    mdast:
      type: cite
      kind: parenthetical
      label: https://doi.org/10.1002/cbic.200500559
      identifier: https://doi.org/10.1002/cbic.200500559

