cases:
  - source: standalone-inline-graphic
    title: standalone inline-graphic becomes an image node
    jats: |-
      <p>An inline icon <inline-graphic xlink:href="icon.gif"/> in text.</p>
    mdast:
      type: paragraph
      children:
        - type: image
          url: icon.gif
  - source: standalone-graphic
    title: standalone graphic becomes an image node
    jats: |-
      <p><graphic xlink:href="figure.png"/></p>
    mdast:
      type: image
      url: figure.png
